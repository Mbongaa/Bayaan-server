services:
  - type: worker
    name: bayaan-livekit-agent
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LIVEKIT_URL
        fromSecret: livekit_url
      - key: LIVEKIT_API_KEY
        fromSecret: livekit_api_key
      - key: LIVEKIT_API_SECRET
        fromSecret: livekit_api_secret
      - key: OPENAI_API_KEY
        fromSecret: openai_api_key
      - key: SPEECHMATICS_API_KEY
        fromSecret: speechmatics_api_key
      - key: SUPABASE_URL
        fromSecret: supabase_url
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromSecret: supabase_service_role_key
      - key: SUPABASE_ANON_KEY
        fromSecret: supabase_anon_key
      - key: PYTHONPATH
        value: /app
      - key: AGENT_NAME
        value: bayaan-transcriber
      - key: WORKER_TYPE
        value: background
      - key: LOG_LEVEL
        value: INFO
      - key: PERSISTENT_MODE
        value: "true"
      - key: MAX_WORKERS
        value: "3"
      - key: IDLE_TIMEOUT
        value: "300"
      - key: AUDIO_STREAM_CAPACITY
        value: "100"
      - key: STT_DRAIN_TIMEOUT_SECONDS
        value: "5"
      - key: TRANSLATION_QUEUE_MAXSIZE
        value: "200"
      - key: TRANSLATION_TIMEOUT_SECONDS
        value: "60"
      - key: TRANSLATION_DRAIN_TIMEOUT_SECONDS
        value: "10"
      - key: MAX_ACCUMULATED_CHARS
        value: "4000"
      - key: MAX_ACTIVE_JOBS_PER_WORKER
        value: "9"
      - key: LIVEKIT_LOAD_THRESHOLD
        value: "0.9"
